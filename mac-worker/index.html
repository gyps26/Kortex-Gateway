<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>MyCRMSIM Worker</title>
    <!-- Use Tailwind via CDN for quick, beautiful styling in the Electron app -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-200 h-screen overflow-hidden flex flex-col font-sans select-none">
    
    <!-- Title Bar (Draggable) -->
    <div style="-webkit-app-region: drag" class="h-10 bg-slate-900 border-b border-slate-800 flex items-center px-4">
        <div class="flex gap-2">
            <div class="w-3 h-3 rounded-full bg-red-500"></div>
            <div class="w-3 h-3 rounded-full bg-yellow-500"></div>
            <div class="w-3 h-3 rounded-full bg-green-500"></div>
        </div>
        <div class="mx-auto text-xs font-bold text-slate-400 tracking-wider">MAC WORKER</div>
    </div>

    <!-- Main Content -->
    <div class="flex-1 p-6 flex flex-col gap-6">
        
        <!-- Status Card -->
        <div class="bg-slate-900 rounded-xl border border-slate-800 p-5 shadow-lg">
            <div class="flex items-center justify-between mb-2">
                <h2 class="text-sm font-semibold text-slate-400">Connection Status</h2>
                <div id="status-indicator" class="flex items-center gap-2 text-xs font-bold text-red-400 bg-red-400/10 px-2 py-1 rounded-full">
                    <div id="status-dot" class="w-2 h-2 rounded-full bg-red-400"></div>
                    <span id="status-text">Disconnected</span>
                </div>
            </div>
            <p id="status-desc" class="text-xs text-slate-500">Awaiting connection token...</p>
        </div>

        <!-- Token Input Area -->
        <div id="token-section" class="flex flex-col gap-3">
            <label class="text-xs font-semibold text-slate-400">Central Hub Token</label>
            <input id="token-input" type="password" placeholder="Paste your token here..." class="bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all text-white placeholder-slate-600">
            <button id="connect-btn" class="bg-indigo-600 hover:bg-indigo-700 active:bg-indigo-800 text-white font-bold py-3 rounded-lg text-sm transition-colors shadow-lg shadow-indigo-900/20">
                Connect to Hub
            </button>
        </div>

        <!-- Logs Area -->
        <div class="flex-1 flex flex-col min-h-0 bg-slate-900 rounded-xl border border-slate-800 p-4">
            <h2 class="text-xs font-semibold text-slate-500 mb-3 flex justify-between">
                <span>Activity Log</span>
                <button id="clear-logs" class="hover:text-slate-300">Clear</button>
            </h2>
            <div id="log-container" class="flex-1 overflow-y-auto font-mono text-[10px] text-slate-400 space-y-1 pr-2">
                <!-- Logs injected here -->
                <div class="text-slate-500">Ready to connect...</div>
            </div>
        </div>

    </div>

    <script src="./renderer.js"></script>
</body>
</html>
